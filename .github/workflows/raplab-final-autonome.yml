          archive = Path("/tmp/raplab-project.zip")
          archive.write_bytes(base64.b64decode("".join(encoded.split())))
          target = Path("generated")

          expected_sha256 = "f3350e63418670656ace2815435f901de4a1cbb2351172014deda98b897851ce"
          actual_sha256 = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual_sha256 != expected_sha256:
              raise SystemExit(
                  f"Archive intégrée invalide : {actual_sha256} au lieu de {expected_sha256}"
              )

          with zipfile.ZipFile(archive, "r") as zf:
              names = [item.filename for item in zf.infolist() if not item.is_dir()]
              if len(names) != len(set(names)):
                  raise SystemExit("Le projet autonome contient des chemins en double.")

              broken = zf.testzip()
              if broken:
                  raise SystemExit(f"Archive corrompue : {broken}")

              for item in zf.infolist():
                  if item.is_dir():
                      continue

                  relative = PurePosixPath(item.filename)
                  if relative.is_absolute() or ".." in relative.parts:
                      raise SystemExit(f"Chemin interdit : {item.filename}")

                  destination = target.joinpath(*relative.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  with zf.open(item, "r") as source, destination.open("wb") as output:
                      shutil.copyfileobj(source, output)

          required = [
              "settings.gradle.kts",
              "build.gradle.kts",
              "gradle.properties",
              "app/build.gradle.kts",
              "app/src/main/AndroidManifest.xml",
              "app/src/main/assets/www/index.html",
              "app/src/main/java/dev/ghostbuilderdev/raplabpro/raplabpro/a07mfop2/MainActivity.java",
          ]

          missing = [name for name in required if not (target / name).is_file()]
          if missing:
              raise SystemExit("Fichiers indispensables absents : " + ", ".join(missing))

          report = [
              "Extraction autonome réussie.",
              f"SHA-256 : {actual_sha256}",
              f"Fichiers : {len(names)}",
              "Doublons : 0",
          ]
          Path("diagnostics/extraction-autonome.txt").write_text(
              "\n".join(report) + "\n",
              encoding="utf-8",
          )
          print("\n".join(report))
          PY

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Installer Android SDK 35
        uses: android-actions/setup-android@v3

      - name: Installer les composants Android
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Préparer la signature Android stable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .signing generated/.signing
          KEYSTORE=".signing/html-apk-stable.p12"
          FINGERPRINT_FILE=".signing/html-apk-stable.sha256"

          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair               -keystore "$KEYSTORE"               -storetype PKCS12               -storepass "HTML_APK_BUILDER_STABLE_2026"               -keypass "HTML_APK_BUILDER_STABLE_2026"               -alias "html-apk-stable"               -keyalg RSA               -keysize 2048               -validity 10000               -dname "CN=HTML APK Builder, OU=Local Apps, O=GhostBuilder, L=Paris, ST=Ile-de-France, C=FR"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$KEYSTORE"
            git commit -m "Persist stable Android signing identity" || true
            git push origin "HEAD:${{ github.ref_name }}" || true
          fi

          CURRENT_FP=$(keytool -list -v             -keystore "$KEYSTORE"             -storetype PKCS12             -storepass "HTML_APK_BUILDER_STABLE_2026"             -alias "html-apk-stable" 2>/dev/null             | awk -F'SHA256: ' '/SHA256:/{gsub(":","",$2); print tolower($2); exit}')

          test -n "$CURRENT_FP"
          printf '%s\n' "$CURRENT_FP" > "$FINGERPRINT_FILE"
          cp "$KEYSTORE" generated/.signing/html-apk-stable.p12
          cp "$FINGERPRINT_FILE" generated/.signing/html-apk-stable.sha256
          echo "Empreinte de signature : $CURRENT_FP"

      - name: Compiler RapLab Pro 2.5
        id: compile
        working-directory: generated
        shell: bash
        run: |
          set +e
          set -o pipefail
          gradle --no-daemon --console=plain :app:assembleDebug --stacktrace 2>&1 | tee ../build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "$BUILD_EXIT" > ../build-exit-code.txt
          exit "$BUILD_EXIT"

      - name: Vérifier et nommer l’APK
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_APK="generated/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$SOURCE_APK"

          ACTUAL_PACKAGE=$("$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$SOURCE_APK"             | awk -F"'" '/^package: name=/{print $2; exit}')
          ACTUAL_VERSION=$("$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$SOURCE_APK"             | awk -F"'" '/^package: name=/{print $4; exit}')

          [ "$ACTUAL_PACKAGE" = "dev.ghostbuilderdev.raplabpro.raplabpro.a07mfop2" ]
          [ "$ACTUAL_VERSION" = "206626336" ]

          APK_FILE="apk-output/RapLab-Pro-2.5-v${ACTUAL_VERSION}-debug.apk"
          cp "$SOURCE_APK" "$APK_FILE"

          {
            echo "APK=$APK_FILE"
            echo "PACKAGE=$ACTUAL_PACKAGE"
            echo "VERSION_NAME=2.5"
            echo "VERSION_CODE=$ACTUAL_VERSION"
            echo "SHA256=$(sha256sum "$APK_FILE" | awk '{print $1}')"
            "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK_FILE" | head -n 10
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK_FILE"
          } | tee apk-output/apk-verification.txt

      - name: Générer le diagnostic final
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "============================================================"
            echo " RAPLAB PRO - BUILD AUTONOME FINAL"
            echo "============================================================"
            echo "Date UTC : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Run      : #${{ github.run_number }}"
            echo "URL      : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Package  : dev.ghostbuilderdev.raplabpro.raplabpro.a07mfop2"
            echo "Version  : 2.5 (206626336)"
            echo
            echo "=== EXTRACTION ==="
            cat diagnostics/extraction-autonome.txt 2>/dev/null || echo "Rapport extraction absent."
            echo
            echo "=== CODE GRADLE ==="
            cat build-exit-code.txt 2>/dev/null || echo "indisponible"
            echo
            echo "=== DERNIÈRES LIGNES GRADLE ==="
            tail -n 180 build.log 2>/dev/null || echo "build.log indisponible"
            echo
            echo "=== APK ==="
            cat apk-output/apk-verification.txt 2>/dev/null || echo "APK non générée."
          } | tee diagnostics/rapport-final-autonome.txt

      - name: Publier l’APK comme artefact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: RapLab-Pro-2.5-APK-FINAL
          path: apk-output/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publier les diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: RapLab-Pro-diagnostic-final-${{ github.run_number }}
          path: |
            diagnostics/
            build.log
            build-exit-code.txt
            apk-output/apk-verification.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Publier ou remplacer la Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE=$(find apk-output -maxdepth 1 -type f -name "*.apk" -print -quit)
          test -n "$APK_FILE"

          if gh release view generated-apk >/dev/null 2>&1; then
            gh release upload generated-apk "$APK_FILE" --clobber
          else
            gh release create generated-apk "$APK_FILE"               --title "RapLab Pro 2.5 - APK finale"               --notes "Compilation autonome propre, sans projet généré par HTMLtoAPK."
          fi
